product:
  type: lib
  platforms: [jvm, android, iosArm64, iosSimulatorArm64, iosX64]

dependencies:
  - ../../domain
  - ../resources
  - $compose.foundation
  - org.jetbrains.compose.material3:material3:1.8.0-alpha03
  - org.jetbrains.compose.material3:material3-window-size-class:1.8.0-alpha03
  - org.jetbrains.compose.material3:material3-adaptive-navigation-suite:1.8.0-alpha03
  - org.jetbrains.compose.material3.adaptive:adaptive:1.0.0-alpha03
  - $compose.materialIconsExtended
  - $compose.components.resources
  - androidx.paging:paging-common:3.3.0-alpha02: exported
  - app.cash.paging:paging-compose-common:3.3.0-alpha02-0.5.1: exported
  - me.gingerninja.lazy:sticky-headers:0.1.0-alpha04: exported
  - com.valentinilk.shimmer:compose-shimmer:1.3.2: exported
  - io.coil-kt.coil3:coil-compose:3.1.0: exported

settings:
  compose:
      version: 1.7.3
      enabled: true
      resources:
        packageName: com.xbot.designsystem
        exposedAccessors: true